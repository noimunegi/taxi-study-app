<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>タクシー法令試験 対策</title>
    <link rel="stylesheet" href="style.css?v=15">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <div id="app">
        <!-- ヘッダー -->
        <header>
            <div class="header-content">
                <h1 id="screen-title">タクシー法令対策</h1>
                <button id="dark-mode-toggle" aria-label="ダークモード切替">
                    <span class="icon">🌙</span>
                </button>
            </div>
        </header>

        <!-- メインコンテンツ -->
        <main id="main-content">
            <!-- 画面1: セット選択 -->
            <section id="set-selection-screen" class="screen active">
                <div class="welcome">
                    <h2>学習セットを選択</h2>
                    <p>解きたい問題を選択してください。</p>
                </div>
                
                <!-- 学習履歴グラフコンテナ -->
                <div id="history-graph-container" class="history-graph-wrapper" style="display:none;">
                    <h3>📈 最近の実力テスト成績</h3>
                    <div id="history-graph-bars" class="graph-bars">
                        <!-- JSで動的に生成 -->
                    </div>
                </div>

                <div class="test-start-container">
                    <button id="start-test-btn" class="test-btn-large">
                        🏆 実力テストを開始
                        <span>全問題からランダムに40問出題</span>
                    </button>
                </div>
                <div id="set-list" class="set-list">
                    <!-- data.js から動的に生成 -->
                </div>
            </section>

            <!-- 画面2: 学習画面 -->
            <section id="study-screen" class="screen">
                <div class="study-header">
                    <div class="study-nav-top">
                        <button id="back-to-menu" class="text-btn">← 戻る</button>
                        <div class="study-actions">
                            <label class="switch" title="シャッフル">
                                <input type="checkbox" id="shuffle-toggle">
                                <span class="slider round"></span>
                                <span class="switch-label">シャッフル</span>
                            </label>
                            <button id="restart-btn" class="icon-btn" title="最初から">🔄</button>
                        </div>
                    </div>
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-bar"></div>
                        <span id="progress-text">0/0</span>
                    </div>
                </div>

                <div class="card-container">
                    <div id="question-card" class="card">
                        <div class="card-face card-front">
                            <div class="question-meta">
                                <span id="question-number">問 1</span>
                                <span id="question-type" class="badge">⚪︎×問題</span>
                            </div>
                            <div id="question-text" class="question-text">
                                問題文がここに表示されます。
                            </div>
                            <div class="tap-hint">タップで解答を表示</div>
                        </div>
                        <div class="card-face card-back">
                            <div class="answer-section">
                                <div id="answer-icon" class="answer-icon">O</div>
                                <div id="answer-text" class="answer-label">正解</div>
                            </div>
                            <div class="explanation-section">
                                <h3>解説</h3>
                                <p id="explanation-text"></p>
                                <div id="review-action-area" class="review-actions" style="display:none;">
                                    <button id="remove-review-btn" class="remove-review-btn">この問題を復習リストから外す</button>
                                </div>
                            </div>
                            <div class="tap-hint">タップで問題に戻る</div>
                        </div>
                    </div>
                </div>

                <div id="test-controls">
                    <button class="test-answer-btn btn-o" data-answer="O">○<span>正しい</span></button>
                    <button class="test-answer-btn btn-x" data-answer="X">×<span>誤り</span></button>
                    <button class="test-answer-btn btn-unsure" data-answer="?">？<span>わからない</span></button>
                </div>

                <div class="controls">
                    <button id="prev-btn" class="ctrl-btn secondary">前へ</button>
                    <button id="next-btn" class="ctrl-btn primary">次へ</button>
                </div>
            </section>
        </main>
    </div>

    <!-- テスト結果オーバーレイ -->
    <div id="test-result-overlay">
        <div class="result-card">
            <h2>テスト結果</h2>
            <div id="result-score" class="result-score">0</div>
            <div class="result-stats">
                <div class="stat-item">
                    <span>正解数</span>
                    <span id="result-correct" class="stat-value">0</span>
                </div>
                <div class="stat-item">
                    <span>総問題数</span>
                    <span id="result-total" class="stat-value">40</span>
                </div>
            </div>
            <p id="result-message">お疲れ様でした！間違えた問題は復習リストに追加されました。</p>
            <button id="close-result-btn" class="ctrl-btn primary" style="width:100%; margin-top:1rem;">メニューに戻る</button>
        </div>
    </div>

    <!-- スクリプト -->
    <script src="data.js?v=15"></script>
    <script src="app.js?v=15"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js?v=15').then(reg => {
                console.log('ServiceWorker registered with scope:', reg.scope);
                reg.addEventListener('updatefound', () => {
                    const installingWorker = reg.installing;
                    if (installingWorker) {
                        installingWorker.addEventListener('statechange', () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                console.log('New version available. Activating...');
                            }
                        });
                    }
                });
            }).catch(err => {
                console.error('ServiceWorker registration failed:', err);
            });

            // コントローラーが交代（新バージョン有効化）したら自動でリロード
            let refreshing = false;
            navigator.serviceWorker.addEventListener('controllerchange', () => {
                if (!refreshing) {
                    refreshing = true;
                    console.log('New ServiceWorker controller active. Reloading...');
                    window.location.reload();
                }
            });
        }
    </script>
</body>
</html>
